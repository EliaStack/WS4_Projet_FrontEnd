            <h1>Connexion</h1>

            <form id="formConnexion" action="">

                <input type="text" name="prenom" id="prenom" placeholder="Entrer votre prénom" required>

                <label for="password">Password</label>
                <input type="password" name="passeword" id="password" placeholder="Mot de passe" required>
                <p id="errorConnexion"></p>
                <p id="error"></p>
                <button type="submit" id="BpSubmit"> <img src="../images/header/log_out.png" alt="se connecter">Se
                    connecter</button>
                <button type="submit" id="inscriptionSubmit">Inscription</button>
            </form>
            <button id="BplisteTache">Voir la liste des tâches</button>
